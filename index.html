<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Image Downloader</title>
    <link rel="stylesheet" href="style.css">
    <!-- JSZip for creating zip files in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- FileSaver for triggering the zip download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <header>
        <h1>Steam Image Downloader</h1>
        <p>Download trading cards, badges, emoticons, and backgrounds directly from SteamCardExchange.</p>
        <div style="margin-bottom: 1.5rem;">
            <a href="https://github.com/ngozz/Steam-Image-Downloader" target="_blank" class="github-btn">
                <svg height="18" width="18" viewBox="0 0 16 16" fill="currentColor" style="vertical-align: text-bottom; margin-right: 5px;">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>View on GitHub
            </a>
        </div>
        <form id="fetch-form">
            <input type="text" id="app-input" placeholder="App ID or Steam Store Link (e.g. 1119980)" required autocomplete="off">
            <button type="submit" id="fetch-btn">Fetch Images</button>
        </form>
        <div id="status-message"></div>
    </header>

    <div id="game-info-container" style="display: none;">
        <img id="game-poster" src="" alt="Game Poster">
        <div class="game-details">
            <h2 id="game-name">Game Name</h2>
            <button id="download-all-btn" class="btn-primary">Download ALL Items (Everything)</button>
        </div>
    </div>

    <main id="results-container">
        <!-- Categories and images will be injected here -->
    </main>

    <script src="app.js"></script>
</body>
</html>
